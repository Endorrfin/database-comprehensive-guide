<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0E1217" />
    <!-- S22: resolve theme before first paint to avoid a flash (dark is the brand default). -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('dbguide.theme');
          var light =
            m === 'light' ||
            (m !== 'dark' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: light)').matches);
          document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
          if (light) {
            var mc = document.querySelector('meta[name="theme-color"]');
            if (mc) mc.setAttribute('content', '#f5f7fa');
          }
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="Deep, interactive, bilingual (EN/UA) guide to how databases actually work — relational & NoSQL internals, indexing, transactions, distribution, and modern engines, with hero simulators."
    />
    <meta name="author" content="Vasyl Krupka" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
